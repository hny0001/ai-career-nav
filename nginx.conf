# Nginx 配置 - ai-career.vip
# 将域名请求反向代理到 Node.js 后端 (8080端口)

server {
    listen 80;
    server_name ai-career.vip;

    # 前端静态文件（可选，如果 Node.js 已经 serve 了静态文件）
    # root C:/Users/Administrator/Desktop/ai-career-nav;
    # index index.html;

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }

    # API 请求代理到后端
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 其他请求也代理到后端（Node.js 会处理静态文件）
    location / {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
